name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Run unit tests
        run: python -m pytest tests/test_package.py -v

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

  langgraph:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with LangGraph and dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e '.[langgraph,dev]'

      - name: Run LangGraph integration tests
        run: python -m pytest tests/test_langgraph_integration.py tests/test_langgraph_evals.py -v

      - name: Run attack scenario demo
        run: python examples/attack_scenarios.py

      - name: Run LangGraph eval suite
        run: python -m agentfirewall.evals.langgraph
