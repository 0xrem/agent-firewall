name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Run unit tests
        run: python -m pytest tests/test_package.py -v

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

  langgraph:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with LangGraph and dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e '.[langgraph,dev]'

      - name: Run LangGraph integration tests
        run: python -m pytest tests/test_langgraph_integration.py tests/test_langgraph_evals.py -v

      - name: Run attack scenario demo
        run: python examples/attack_scenarios.py

      - name: Run LangGraph eval suite
        run: python -m agentfirewall.evals.langgraph

  openai-agents:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with OpenAI Agents and dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e '.[openai-agents,dev]'

      - name: Run OpenAI Agents adapter tests
        run: python -m pytest tests/test_openai_agents_integration.py tests/test_openai_agents_evals.py -v

      - name: Run OpenAI Agents eval suite
        run: python -m agentfirewall.evals.openai_agents

  runtime-support:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with runtime extras and dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e '.[langgraph,openai-agents,dev]'

      - name: Generate runtime support manifest
        run: python -m agentfirewall.runtime_support --include-evidence --output runtime-support-manifest.json

      - name: Validate runtime support manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("runtime-support-manifest.json").read_text(encoding="utf-8"))
          assert payload["schema_version"] == 1
          inventory = {item["name"]: item for item in payload["inventory"]}
          assert {"langgraph", "generic_wrappers", "openai_agents"} <= set(inventory)
          preview = {
              item["name"]: item
              for item in payload["evidence"]["preview_runtimes"]
          }
          assert preview["generic_wrappers"]["ok"] is True
          official = {
              item["name"]: item
              for item in payload["evidence"]["official_adapters"]
          }
          assert official["langgraph"]["ok"] is True
          assert official["openai_agents"]["ok"] is True
          PY
